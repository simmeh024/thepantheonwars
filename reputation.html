<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reputation — The Pantheon Wars</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'"><noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
<link rel="icon" href="favicon.ico"><link rel="stylesheet" href="css/community-bundle.css?v=243"><link rel="stylesheet" href="css/reputation.css?v=1">
</head>
<body>
<header class="site-header"><div class="nav-inner"><button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button><a href="index.html" class="logo"><span class="logo-shard"></span>The <span class="logo-name">Pantheon Wars</span></a><nav class="main-nav"><a href="index.html">Home</a><a href="community.html">Community</a><a href="profile.html">Settings</a></nav><span class="nav-utility"><span class="auth-nav-item" id="auth-nav-item"><a href="#" class="auth-trigger">Login</a></span></span></div></header>
<main><section><div class="container reputation-page">
  <div id="reputation-gate" class="profile-gate" hidden><span class="eyebrow">Members Only</span><h1>Your Reputation</h1><p>Log in to view your reputation history and achievements.</p><button type="button" class="btn btn-solid auth-trigger" data-tab="login">Log In</button></div>
  <div id="reputation-content" hidden>
    <div class="reputation-page-head"><span class="eyebrow">Community standing</span><h1>Reputation</h1><p id="reputation-level-copy">Loading your rank…</p><div class="reputation-page-bar"><span id="reputation-level-square"></span><span class="reputation-bar-track"><span id="reputation-level-fill" class="reputation-bar-fill"></span></span></div></div>
    <div class="reputation-columns"><section class="reputation-card"><div class="reputation-card-head"><h2>Recent signals</h2><span id="reputation-total" class="reputation-total"></span></div><div id="reputation-log" class="reputation-log"><p class="lore-status">Loading your history…</p></div><div class="reputation-log-actions"><button id="reputation-more" type="button" class="btn" hidden>View more</button></div></section>
    <section class="reputation-card"><div class="reputation-card-head"><h2>Achievements</h2><span id="reputation-achievement-count" class="reputation-total"></span></div><div id="reputation-achievements" class="reputation-achievements"></div></section></div>
  </div>
</div></section></main>
<script src="js/members.js?v=30"></script>
<script>
(function () {
  'use strict'; var gate=document.getElementById('reputation-gate'), content=document.getElementById('reputation-content'), log=document.getElementById('reputation-log'), more=document.getElementById('reputation-more'), page=1, pages=1;
  function esc(v){var d=document.createElement('div');d.textContent=v||'';return d.innerHTML;}
  function date(v){var d=new Date(String(v).replace(' ','T')+'Z');return isNaN(d)?v:d.toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'});}
  function loadLog(append){fetch('/api/reputation/history.php?page='+page,{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(data){pages=data.pages||1; if(!append)log.innerHTML=''; if(!data.entries.length&&!append)log.innerHTML='<p class="lore-status">No logged reputation changes yet.</p>'; data.entries.forEach(function(entry){var row=document.createElement('div');row.className='reputation-log-row '+(Number(entry.points)<0?'is-loss':'');row.innerHTML='<div><strong>'+esc(entry.label)+'</strong><small>'+date(entry.created_at)+(entry.note?' · '+esc(entry.note):'')+'</small></div><b>'+(Number(entry.points)>0?'+':'')+entry.points+' rep</b>';log.appendChild(row);});more.hidden=page>=pages;});}
  function load(){if(!window.PW_AUTH.loggedIn){gate.hidden=false;content.hidden=true;return;}gate.hidden=true;content.hidden=false;fetch('/api/reputation/summary.php',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(data){if(!data.ok)throw new Error();var rep=data.reputation||{}, color=rep.level_color||'#a279ec';document.getElementById('reputation-level-copy').textContent=(rep.level_name||'Unranked')+' · '+rep.points+' reputation'+(rep.next_level_name?' · '+Math.max(0,rep.next_level_threshold-rep.points)+' to '+rep.next_level_name:'');document.getElementById('reputation-total').textContent=rep.points+' rep';var square=document.getElementById('reputation-level-square'),fill=document.getElementById('reputation-level-fill');square.style.background=color;square.textContent=rep.level_number||'';fill.style.width=(rep.progress_percent||0)+'%';fill.style.background=color;var area=document.getElementById('reputation-achievements');area.innerHTML='';var unlocked=0;(data.achievements||[]).forEach(function(a){if(a.unlocked)unlocked++;var card=document.createElement('div');card.className='reputation-achievement '+(a.unlocked?'is-unlocked':'');card.innerHTML='<span>'+esc(a.icon)+'</span><div><strong>'+esc(a.name)+' <em>+'+Number(a.points||0)+' rep</em></strong><small>'+esc(a.description)+(a.unlocked?' · Unlocked':'')+'</small></div>';area.appendChild(card);});document.getElementById('reputation-achievement-count').textContent=unlocked+'/'+(data.achievements||[]).length;}).catch(function(){document.getElementById('reputation-level-copy').textContent='Reputation history is being prepared.';});page=1;loadLog(false);}
  more.addEventListener('click',function(){page++;loadLog(true);});document.addEventListener('pw-auth-ready',load);load();
}());
</script></body></html>
